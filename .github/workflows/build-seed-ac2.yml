name: Build BeeconMini SEED AC2

# 仅手动触发
on:
  workflow_dispatch:

# Node.js 24 兼容性：2026-06-02 起 GitHub Actions 强制使用 Node.js 24
# 此环境变量确保所有 action 在切换前就以 Node.js 24 运行，避免届时构建中断。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ──────────────────────────────────────────────────────────────
      # 0. 把构建目录挂到 runner 的 150 GB 临时盘（/mnt）
      #    避免系统盘（约 14 GB）编译中途爆满
      # ──────────────────────────────────────────────────────────────
      - name: Mount build workspace to /mnt
        run: |
          sudo mkdir -p /mnt/openwrt
          sudo chown runner:runner /mnt/openwrt
          echo "WORKSPACE=/mnt/openwrt" >> $GITHUB_ENV

      # ──────────────────────────────────────────────────────────────
      # 1. 检出本仓库（包含 configs/ 目录）
      # ──────────────────────────────────────────────────────────────
      - name: Checkout this repo
        uses: actions/checkout@v4.2.2
        with:
          path: source

      # ──────────────────────────────────────────────────────────────
      # 2. 释放 runner 自带的无用磁盘空间（约 5 GB）
      # ──────────────────────────────────────────────────────────────
      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            || true

      # ──────────────────────────────────────────────────────────────
      # 3. 安装编译依赖
      #
      #    Ubuntu 22.04 (runner) 特殊处理：
      #      perl-modules-5.34  — 确保 Perl 5.34 模块集完整
      #      python3-distutils  — Ubuntu 22.04 Python 3.10 不自带，
      #                           prereq-build.mk 明确检测此工具
      #      python3-setuptools — 部分 Python host 工具依赖
      #      bison              — 内核编译必需（parser generator）
      #      libelf-dev         — 内核模块编译必需（提供 libelf.h）
      # ──────────────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            bison \
            build-essential \
            ccache \
            clang \
            cmake \
            cpio \
            curl \
            file \
            flex \
            gawk \
            gettext \
            git \
            gperf \
            lib32gcc-s1 \
            libc6-dev-i386 \
            libelf-dev \
            libncurses5-dev \
            libssl-dev \
            patch \
            perl-modules-5.34 \
            python3 \
            python3-distutils \
            python3-setuptools \
            rsync \
            subversion \
            unzip \
            wget \
            zlib1g-dev \
            zstd

      # ──────────────────────────────────────────────────────────────
      # 4. 克隆 BeeconMini ImmortalWrt（branch 24.10.1）
      # ──────────────────────────────────────────────────────────────
      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b 24.10.1 \
            https://github.com/BeeconMini/immortalwrt.git \
            $WORKSPACE/openwrt

      # ──────────────────────────────────────────────────────────────
      # 5. 更新并安装 feeds
      #    标准 feeds（packages / luci / routing / telephony）来自
      #    仓库内的 feeds.conf.default，固定 commit 保证可复现。
      #    额外追加 iStore feed 以获取 luci-app-store。
      # ──────────────────────────────────────────────────────────────
      - name: Update & install feeds
        run: |
          cd $WORKSPACE/openwrt
          echo "src-git istore https://github.com/linkease/istore.git;main" \
            >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ──────────────────────────────────────────────────────────────
      # 5b. 替换 golang 工具链为 sbwml 维护版本
      #
      #     immortalwrt 固定 feeds commit 中的 golang 版本较旧，
      #     导致部分需要较新 Go 版本的包（ttyd 等）无法编译。
      #     sbwml 维护版提供最新 Go 工具链（1.22+），专为 OpenWrt CI 优化。
      #     执行时机：feeds install 之后直接替换目录即可，
      #     package/feeds/packages/golang 的符号链接无需重跑 feeds。
      # ──────────────────────────────────────────────────────────────
      - name: Replace golang with sbwml maintained version
        run: |
          rm -rf $WORKSPACE/openwrt/feeds/packages/lang/golang
          git clone --depth=1 \
            https://github.com/sbwml/packages_lang_golang \
            $WORKSPACE/openwrt/feeds/packages/lang/golang
          echo "=== golang 版本（替换后）==="
          grep "^PKG_VERSION" \
            $WORKSPACE/openwrt/feeds/packages/lang/golang/golang/Makefile \
            2>/dev/null || \
          grep "^PKG_VERSION" \
            $WORKSPACE/openwrt/feeds/packages/lang/golang/Makefile \
            2>/dev/null || \
          echo "（golang 目录已替换）"

      # ──────────────────────────────────────────────────────────────
      # 6. 修补 feeds
      #
      #    补丁 C：libxcrypt 双重修复（必须在 feeds install 之后执行）
      #
      #      根因（openwrt/packages#22882）：
      #        libxcrypt <= 4.4.34 的配置脚本
      #        build-aux/scripts/expand-selected-hashes 在较新 Perl
      #        上失败，报错：
      #          BEGIN failed--compilation aborted at
      #          .../expand-selected-hashes line 28.
      #          configure: error: bad value 'solaris' for --enable-hashes
      #        原因是 Perl 对 'open' pragma 的处理方式在新版本中变化。
      #        修复：升级至 4.4.36（2023-12 官方修复版本）。
      #        sha256: e5e1f4caee0a01de2aee26e3138807d6d3ca2b8e67287966d1fefd65e1fd8943
      #
      #      附加问题（openwrt/packages#18994）：
      #        CONFIG_PKG_FORTIFY_SOURCE_2=y 启用时，libxcrypt 的
      #        crypt-bcrypt.c 触发 -Werror=format-nonliteral 编译失败。
      #        修复：注入 PKG_FORTIFY_SOURCE:=0。
      #
      #      已通过 test-libxcrypt.sh 在 libxcrypt-4.4.36 上验证有效。
      #
      #    补丁 A：rust 禁用 download-ci-llvm
      #      feeds/packages/lang/rust/Makefile 中的
      #        --set=llvm.download-ci-llvm=true
      #      会从 ci-artifacts.rust-lang.org 下载预编译 LLVM，
      #      但该 URL 对旧版本 Rust 已 404（CI 产物定期清理）。
      #      修复：改为 false，让 LLVM 从源码本地编译。
      #      来源：OpenWrt 官方 commit b49fb106，openwrt/packages#27331。
      #
      #    补丁 B：openclash 移除 shadowsocks-rust 强制依赖
      #      BeeconMini fork 可能已自行移除，此处作为双重保障。
      # ──────────────────────────────────────────────────────────────
      - name: Patch feeds
        run: |
          # ── 补丁 C：libxcrypt 双重修复 ───────────────────────────
          LIBXCRYPT_MK="$WORKSPACE/openwrt/feeds/packages/libs/libxcrypt/Makefile"
          if [ -f "$LIBXCRYPT_MK" ]; then
            echo "=== libxcrypt 当前版本 ==="
            grep "^PKG_VERSION" "$LIBXCRYPT_MK"

            # C-1：升级至 4.4.36（修复 expand-selected-hashes Perl 兼容性）
            sed -i 's/^PKG_VERSION:=.*/PKG_VERSION:=4.4.36/' "$LIBXCRYPT_MK"
            sed -i 's/^PKG_HASH:=.*/PKG_HASH:=e5e1f4caee0a01de2aee26e3138807d6d3ca2b8e67287966d1fefd65e1fd8943/' "$LIBXCRYPT_MK"

            # C-2：禁用 fortify（在 include package.mk 行前插入，幂等）
            if ! grep -q "^PKG_FORTIFY_SOURCE" "$LIBXCRYPT_MK"; then
              sed -i '/^include.*package\.mk/i PKG_FORTIFY_SOURCE:=0' "$LIBXCRYPT_MK"
            fi

            echo "=== patch 后关键行 ==="
            grep -E "^PKG_VERSION|^PKG_HASH|^PKG_FORTIFY" "$LIBXCRYPT_MK"

            # 验证补丁真正生效，失败则立即终止
            PATCHED_VER=$(grep "^PKG_VERSION" "$LIBXCRYPT_MK" \
              | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            if [ "$PATCHED_VER" != "4.4.36" ]; then
              echo "ERROR: libxcrypt PKG_VERSION 升级失败（当前: $PATCHED_VER）"
              exit 1
            fi
            echo "=== libxcrypt 双重修复完成并验证 ==="
          else
            echo "WARNING: libxcrypt Makefile 未找到：$LIBXCRYPT_MK"
          fi

          # ── 补丁 A：rust 禁用 download-ci-llvm ──────────────────
          RUST_MK="$WORKSPACE/openwrt/feeds/packages/lang/rust/Makefile"
          if [ -f "$RUST_MK" ]; then
            echo "=== rust patch 前 ==="
            grep "download-ci-llvm" "$RUST_MK" || echo "（未找到该行）"
            sed -i 's/download-ci-llvm=true/download-ci-llvm=false/g' "$RUST_MK"
            echo "=== rust patch 后 ==="
            grep "download-ci-llvm" "$RUST_MK" || true
          else
            echo "WARNING: rust Makefile 未找到：$RUST_MK"
          fi

          # ── 补丁 B：openclash 移除 shadowsocks-rust 依赖 ────────
          OPENCLASH_MK="$WORKSPACE/openwrt/feeds/luci/applications/luci-app-openclash/Makefile"
          if [ -f "$OPENCLASH_MK" ]; then
            grep -n "shadowsocks[-_]rust" "$OPENCLASH_MK" \
              || echo "（未找到，可能已不存在）"
            sed -i '/shadowsocks[-_]rust/Id' "$OPENCLASH_MK"
            echo "=== openclash patch 完成 ==="
          else
            echo "WARNING: openclash Makefile 未找到：$OPENCLASH_MK"
          fi

      # ──────────────────────────────────────────────────────────────
      # 7a. 集成 OpenAppFilter (OAF)
      #
      #     来源：destan19/OpenAppFilter（支持抖音/王者荣耀等数百款 App）
      #     注意：OAF Kconfig 存在自引用循环依赖 bug，
      #     已在 seed-ac2.config 中显式声明所有子包 =y 强制选中。
      # ──────────────────────────────────────────────────────────────
      - name: Integrate OpenAppFilter (OAF)
        run: |
          git clone --depth=1 \
            https://github.com/destan19/OpenAppFilter.git \
            $WORKSPACE/openwrt/package/OpenAppFilter
          echo "=== OAF 集成完成 ==="
          ls $WORKSPACE/openwrt/package/OpenAppFilter/

      # ──────────────────────────────────────────────────────────────
      # 7b. 集成 TurboACC（含 SFE 软件流量加速）
      #
      #     【新增包（放入 package/turboacc/）】
      #       luci-app-turboacc — LuCI 管理界面
      #       nft-fullcone      — nftables 全锥型 NAT
      #       shortcut-fe       — SFE 加速引擎
      #
      #     【替换原始包（turboacc 修补版，添加 SFE offload hook）】
      #       firewall4 / libnftnl / nftables
      #
      #     【内核 patch（kernel 6.6）】
      #       952：conntrack 多注册者事件支持（SFE hook 必需）
      #       953：shortcut-fe 额外内核钩子
      #       613：netfilter optional tcp window check
      # ──────────────────────────────────────────────────────────────
      - name: Integrate TurboACC (with SFE)
        run: |
          cd $WORKSPACE/openwrt

          git clone --depth=1 -b luci \
            https://github.com/chenmozhijin/turboacc.git \
            /tmp/turboacc-luci
          git clone --depth=1 -b package \
            https://github.com/chenmozhijin/turboacc.git \
            /tmp/turboacc-pkg

          # ── 放置新增包 ────────────────────────────────────────────
          mkdir -p package/turboacc
          cp -r /tmp/turboacc-luci/luci-app-turboacc  package/turboacc/
          cp -r /tmp/turboacc-pkg/nft-fullcone         package/turboacc/
          cp -r /tmp/turboacc-pkg/shortcut-fe          package/turboacc/

          # ── 替换 firewall4 / libnftnl / nftables ─────────────────
          if [ -d /tmp/turboacc-pkg/firewall4 ]; then
            rm -rf package/network/config/firewall4
            cp -r /tmp/turboacc-pkg/firewall4 package/network/config/firewall4
            echo "=== firewall4 已替换为 turboacc 修补版 ==="
          else
            echo "WARN: turboacc/firewall4 未找到，跳过"
          fi

          if [ -d /tmp/turboacc-pkg/libnftnl ]; then
            rm -rf package/libs/libnftnl
            cp -r /tmp/turboacc-pkg/libnftnl package/libs/libnftnl
            echo "=== libnftnl 已替换为 turboacc 修补版 ==="
          else
            echo "WARN: turboacc/libnftnl 未找到，跳过"
          fi

          if [ -d /tmp/turboacc-pkg/nftables ]; then
            rm -rf package/network/utils/nftables
            cp -r /tmp/turboacc-pkg/nftables package/network/utils/nftables
            echo "=== nftables 已替换为 turboacc 修补版 ==="
          else
            echo "WARN: turboacc/nftables 未找到，跳过"
          fi

          # ── 打内核 patch（kernel 6.6）────────────────────────────
          HACK=target/linux/generic/hack-6.6
          PEND=target/linux/generic/pending-6.6
          CFG=target/linux/generic/config-6.6
          mkdir -p "$HACK" "$PEND"

          # patch 952：conntrack 多注册者事件（SFE 必需）
          P952_FOUND=0
          for f in \
            "952-add-net-conntrack-events-support-multiple-registrant.patch" \
            "952-net-conntrack-events-support-multiple-registrant.patch" \
            "952-net-conntrack-events.patch"
          do
            if [ -f "/tmp/turboacc-luci/hack-6.6/$f" ]; then
              cp "/tmp/turboacc-luci/hack-6.6/$f" "$HACK/"
              echo "=== 已应用 patch 952: $f ==="
              P952_FOUND=1; break
            fi
          done
          [ $P952_FOUND -eq 0 ] && echo "WARN: patch 952 未找到"

          # patch 953：shortcut-fe 额外内核钩子
          P953_FOUND=0
          for f in $(ls /tmp/turboacc-luci/hack-6.6/953-*.patch 2>/dev/null); do
            cp "$f" "$HACK/"
            echo "=== 已应用 $(basename $f) ==="
            P953_FOUND=1
          done
          [ $P953_FOUND -eq 0 ] && echo "WARN: patch 953 未找到"

          # patch 613：netfilter optional tcp window check
          P613_FOUND=0
          for f in \
            "613-netfilter_optional_tcp_window_check.patch" \
            "613-netfilter_optional_tcp_window_check_v2.patch"
          do
            if [ -f "/tmp/turboacc-luci/pending-6.6/$f" ]; then
              cp "/tmp/turboacc-luci/pending-6.6/$f" "$PEND/"
              echo "=== 已应用 patch 613: $f ==="
              P613_FOUND=1; break
            fi
          done
          [ $P613_FOUND -eq 0 ] && echo "WARN: patch 613 未找到"

          # CONFIG_NF_CONNTRACK_CHAIN_EVENTS：SFE conntrack hook 必需
          grep -q "CONFIG_NF_CONNTRACK_CHAIN_EVENTS" "$CFG" 2>/dev/null || \
            echo "# CONFIG_NF_CONNTRACK_CHAIN_EVENTS is not set" >> "$CFG"

          echo "=== TurboACC 集成完成 ==="
          echo "  package/turboacc/: $(ls package/turboacc/)"
          echo "  hack-6.6 patches:    $(ls $HACK/9[0-9][0-9]-*.patch 2>/dev/null | xargs -n1 basename 2>/dev/null | tr '\n' ' ')"
          echo "  pending-6.6 patches: $(ls $PEND/6[0-9][0-9]-*.patch 2>/dev/null | xargs -n1 basename 2>/dev/null | tr '\n' ' ')"

      # ──────────────────────────────────────────────────────────────
      # 7c. 集成 QuickStart（快速配置向导）
      #
      #     quickstart 不在任何标准 feed 中，需独立 clone：
      #       后端服务: linkease/nas-packages → package/quickstart
      #       LuCI 前端: lq-wq/luci-app-quickstart → package/luci-app-quickstart
      #     移除 luci-app-quickstart 对 luci-app-store 的强制依赖，
      #     避免与 iStore feed 版本冲突。
      # ──────────────────────────────────────────────────────────────
      - name: Integrate QuickStart
        run: |
          cd $WORKSPACE/openwrt

          git clone --depth=1 \
            https://github.com/linkease/nas-packages.git \
            /tmp/nas-packages
          cp -r /tmp/nas-packages/network/services/quickstart \
            package/quickstart

          git clone --depth=1 \
            https://github.com/lq-wq/luci-app-quickstart.git \
            package/luci-app-quickstart

          sed -i 's/ +luci-app-store//g' \
            package/luci-app-quickstart/Makefile 2>/dev/null || true

          echo "=== QuickStart 集成完成 ==="
          ls package/quickstart package/luci-app-quickstart

      # ──────────────────────────────────────────────────────────────
      # 8. 源码级修改
      #
      #    8-A  默认 LAN IP：192.168.1.1 → 192.168.88.1
      #
      #    8-B  kernel vermagic 对齐官方（兼容官方 kmod ipk）
      #         自编译加入 TurboACC/SFE 等额外 kconfig 项导致 MD5
      #         与官方不同，固件烧录后 opkg install kmod-xxx 会报
      #         "kernel version mismatch"。
      #         修复：硬编码官方 vermagic（已人工核实），patch
      #         include/kernel-defaults.mk 跳过 MD5 计算直接复制。
      # ──────────────────────────────────────────────────────────────
      - name: Patch source - LAN IP and kernel vermagic
        run: |
          cd $WORKSPACE/openwrt

          # ── 8-A：修改默认 LAN IP ──────────────────────────────────
          sed -i 's/192.168.1.1/192.168.88.1/g' \
            package/base-files/files/bin/config_generate
          echo "=== LAN IP patch 后 ==="
          grep "192\.168\." package/base-files/files/bin/config_generate

          # ── 8-B：对齐官方 vermagic ────────────────────────────────
          # 官方 immortalwrt 24.10.1 filogic vermagic（已人工核实）：
          #   kmods/6.6.86-1-f2c63d42896f12da2b55f2c2b626e7be/
          #   kernel  : 6.6.86
          #   vermagic: f2c63d42896f12da2b55f2c2b626e7be
          # 硬编码避免动态抓取的不稳定性（bash set -e + grep 无匹配陷阱）。
          # 若升级到新版本，请同步更新此值。
          VERMAGIC="f2c63d42896f12da2b55f2c2b626e7be"
          echo "=== 写入 vermagic: $VERMAGIC ==="
          echo "$VERMAGIC" > vermagic

          # patch include/kernel-defaults.mk：
          #   原始行：grep '=[ym]' ... | $(MKHASH) md5 > $(LINUX_DIR)/.vermagic
          #   替换为：        cp $(TOPDIR)/vermagic $(LINUX_DIR)/.vermagic
          sed -i \
            '/grep.*\[ym\].*\.config\.set.*MKHASH.*md5.*\.vermagic/c\\t\tcp $(TOPDIR)/vermagic $(LINUX_DIR)/.vermagic' \
            include/kernel-defaults.mk

          echo "=== kernel-defaults.mk vermagic 相关行（patch 后）==="
          grep -n "vermagic" include/kernel-defaults.mk

      # ──────────────────────────────────────────────────────────────
      # 9. 合并配置 & make defconfig
      #
      #    两层 cat 合并：
      #      ① mt7981-common.config — MT7981B 平台通用（无 Wi-Fi）
      #      ② seed-ac2.config      — SEED AC2 专属差异
      # ──────────────────────────────────────────────────────────────
      - name: Merge config & run defconfig
        run: |
          cd $WORKSPACE/openwrt
          cat \
            $GITHUB_WORKSPACE/source/configs/mt7981-common.config \
            $GITHUB_WORKSPACE/source/configs/seed-ac2.config \
            > .config
          make defconfig

          echo "=== TurboACC / SFE 相关行 ==="
          grep -iE "shortcut.fe|turboacc|fullcone" .config | head -10 || echo "（未选中）"
          echo "=== dnsmasq 相关行 ==="
          grep -i "dnsmasq" .config | head -5
          echo "=== PoE 相关行 ==="
          grep -iE "poe|poemgr" .config | head -5 || echo "（未选中）"
          echo "=== LAN IP 验证 ==="
          grep "192\.168\." package/base-files/files/bin/config_generate | head -3
          echo "=== vermagic 文件内容 ==="
          cat vermagic 2>/dev/null || echo "（vermagic 文件未生成）"

      # ──────────────────────────────────────────────────────────────
      # 10. 下载所有源码包（并行 + 失败重试）
      # ──────────────────────────────────────────────────────────────
      - name: Download package sources
        run: |
          cd $WORKSPACE/openwrt
          make download -j$(nproc)
          make download -j$(nproc) || true

      # ──────────────────────────────────────────────────────────────
      # 11. 编译固件
      #     先并行编译；失败后以单线程 + 详细日志重试便于排查
      # ──────────────────────────────────────────────────────────────
      - name: Compile firmware
        run: |
          cd $WORKSPACE/openwrt
          make -j$(nproc) || make -j1 V=s

      # ──────────────────────────────────────────────────────────────
      # 12. 收集固件产物
      # ──────────────────────────────────────────────────────────────
      - name: Collect firmware artifacts
        run: |
          mkdir -p /tmp/artifacts
          find $WORKSPACE/openwrt/bin/targets -type f \
            \( -name "*sysupgrade*.bin" \
               -o -name "*factory*.bin" \
               -o -name "*.manifest" \) \
            -exec cp {} /tmp/artifacts/ \;
          echo "=== Collected files ==="
          ls -lh /tmp/artifacts/

      # ──────────────────────────────────────────────────────────────
      # 13. 上传 GitHub Artifact（保留 30 天）
      # ──────────────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: beeconmini-seed-ac2-${{ github.run_number }}
          path: /tmp/artifacts/
          retention-days: 30

      # ──────────────────────────────────────────────────────────────
      # 14. 生成 Release Tag（格式：yyyymmdd + run_number）
      # ──────────────────────────────────────────────────────────────
      - name: Generate release tag
        id: tag
        run: |
          echo "TAG=$(date +%Y%m%d)${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────────────
      # 15. 发布 GitHub Release
      # ──────────────────────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        if: success()
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "BeeconMini SEED AC2 | ${{ steps.tag.outputs.TAG }}"
          body: |
            ## BeeconMini SEED AC2 自动构建固件

            **构建信息**
            - Commit: ${{ github.sha }}
            - Branch: 24.10.1
            - 上游: BeeconMini/immortalwrt

            **硬件规格**
            | 项目 | 参数 |
            |------|------|
            | CPU | MT7981B (Filogic 820, Cortex-A53 ×2) |
            | 交换芯片 | RTL8373（8×2.5G PoE+） |
            | WAN PHY | RTL8221B（2.5G） |
            | 存储 | 1G RAM + 64G eMMC |
            | Wi-Fi | 无 |
            | PoE 单口最大功率 | 30W |

            **固件包含功能**
            - PoE 管理（RTL8238B，8 口 PoE+，realtek-poe + poemgr）
            - OpenClash（透明代理）
            - OAF 应用过滤（OpenAppFilter，支持抖音 / 王者荣耀等数百款 App）
            - NLBW 实时带宽监控（nlbwmon）
            - VLMCSD（KMS 激活服务器）
            - ttyd（Web 终端）
            - iStore 应用商店 + QuickStart 快速配置
            - File Manager（Web 文件管理器）
            - 定时重启
            - TurboACC 网络加速（SFE 软件流量分载 + nft-fullcone 全锥型 NAT）
            - eQoS 带宽控制 / UPnP
            - dnsmasq-full（含 DNSSEC / ipset 支持）
            - 默认 LAN IP：192.168.88.1
            - kernel vermagic 对齐官方，可直接 opkg 安装官方 kmod-*.ipk

            **刷机说明**
            - `*sysupgrade*` — 从 OpenWrt/ImmortalWrt 在线升级
            - `*factory*` — 从原厂固件首次刷入
          files: |
            ${{ env.WORKSPACE }}/openwrt/bin/targets/*/*/*.bin
            ${{ env.WORKSPACE }}/openwrt/bin/targets/*/*/*.manifest
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
