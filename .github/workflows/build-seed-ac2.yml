#=====================================================================
# Build ImmortalWrt 24.10.1 + TurboACC (SFE) for BeeconMini SEED AC2
# 目标: mediatek/filogic (mt7981b) | 内核: 6.6
# 源码: BeeconMini/immortalwrt  Commit: 9d076a1
#
# 本 workflow 吸取了大量实际编译调试经验（详见 README.md）
#=====================================================================

name: Build BeeconMini SEED AC2

on:
  workflow_dispatch:
    inputs:
      enable_sfe:
        description: '启用 Shortcut-FE'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_ssh:
        description: '启用 SSH 调试 (tmate)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REPO_URL: https://github.com/BeeconMini/immortalwrt
  REPO_BRANCH: main
  REPO_COMMIT: 9d076a1
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 工作目录
  WORKSPACE: /workdir

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    # ================================================================
    # Step 1: 释放磁盘空间
    # ================================================================
    - name: 释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    # ================================================================
    # Step 2: 检出本仓库
    # ================================================================
    - name: 检出本仓库
      uses: actions/checkout@v4.2.2

    # ================================================================
    # Step 3: 初始化编译环境
    # 经验教训:
    #   - 必须包含 bison (内核编译)
    #   - 必须包含 libelf-dev (内核模块编译)
    #   - 必须包含 python3-distutils (prereq-build.mk 检测)
    #   - 必须包含 perl-modules-5.34 (libxcrypt 兼容)
    # ================================================================
    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
          ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev \
          gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
          libtool lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
          patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools python3-distutils python3-setuptools \
          qemu-utils re2c rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd \
          perl-modules-5.34
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p $WORKSPACE
        sudo chown $USER:$GROUPS $WORKSPACE

    # ================================================================
    # Step 4: 克隆 ImmortalWrt 源码
    # ================================================================
    - name: 克隆 ImmortalWrt 源码
      working-directory: ${{ env.WORKSPACE }}
      run: |
        df -hT $PWD
        git clone $REPO_URL openwrt
        cd openwrt
        if [ -n "$REPO_COMMIT" ]; then
          echo ">>> Checking out commit: $REPO_COMMIT"
          git checkout $REPO_COMMIT
        fi

    # ================================================================
    # Step 5: 整合 TurboACC (使用官方 add_turboacc.sh)
    #
    # 经验教训:
    #   - 绝对不要手动拆解 turboacc 仓库结构，直接调用官方脚本
    #   - turboacc package 分支使用版本化子目录 (firewall4-<VER>/firewall4/)
    #   - add_turboacc.sh 会自动处理版本匹配和路径
    #   - add_turboacc.sh 向 config-6.6 写入的是 "is not set" (禁用)
    #     必须在脚本运行后手动改为 =y
    # ================================================================
    - name: 整合 TurboACC
      working-directory: ${{ env.WORKSPACE }}/openwrt
      env:
        ENABLE_SFE: ${{ github.event.inputs.enable_sfe || 'true' }}
      run: |
        echo "============================================"
        echo "  整合 TurboACC | SFE: ${ENABLE_SFE}"
        echo "============================================"

        # 确保非交互式运行（预删除旧目录）
        rm -rf ./package/turboacc

        # 下载并执行官方脚本
        curl -sSL https://raw.githubusercontent.com/chenmozhijin/turboacc/luci/add_turboacc.sh \
          -o add_turboacc.sh
        chmod +x add_turboacc.sh

        if [ "${ENABLE_SFE}" = "true" ]; then
          bash add_turboacc.sh
        else
          bash add_turboacc.sh --no-sfe
        fi

        # ---- 关键修复: add_turboacc.sh 写入的是 "is not set" ----
        # 必须改为 =y，否则 patch 953 的 #ifdef CONFIG_SHORTCUT_FE 不生效
        CFG="./target/linux/generic/config-6.6"

        # CONFIG_NF_CONNTRACK_CHAIN_EVENTS
        sed -i 's/^# CONFIG_NF_CONNTRACK_CHAIN_EVENTS is not set/CONFIG_NF_CONNTRACK_CHAIN_EVENTS=y/' "$CFG"
        grep -q "^CONFIG_NF_CONNTRACK_CHAIN_EVENTS=y" "$CFG" \
          || echo "CONFIG_NF_CONNTRACK_CHAIN_EVENTS=y" >> "$CFG"

        # CONFIG_SHORTCUT_FE (仅 SFE 模式)
        if [ "${ENABLE_SFE}" = "true" ]; then
          sed -i 's/^# CONFIG_SHORTCUT_FE is not set/CONFIG_SHORTCUT_FE=y/' "$CFG"
          grep -q "^CONFIG_SHORTCUT_FE=y" "$CFG" \
            || echo "CONFIG_SHORTCUT_FE=y" >> "$CFG"
        fi

        # ---- 验证 ----
        echo "=== config-6.6 关键配置 ==="
        grep -E "CONNTRACK_CHAIN|SHORTCUT_FE" "$CFG" || echo "(none)"

        echo "=== 验证文件就位 ==="
        ls ./package/turboacc/luci-app-turboacc/Makefile && echo "✓ luci-app-turboacc"
        ls ./package/turboacc/nft-fullcone/Makefile && echo "✓ nft-fullcone"
        [ "${ENABLE_SFE}" = "true" ] && ls ./package/turboacc/shortcut-fe/ && echo "✓ shortcut-fe"
        ls ./package/network/config/firewall4/Makefile && echo "✓ firewall4 (replaced)"
        ls ./package/network/utils/nftables/Makefile && echo "✓ nftables (replaced)"
        ls ./package/libs/libnftnl/Makefile && echo "✓ libnftnl (replaced)"
        ls ./target/linux/generic/hack-6.6/952-* && echo "✓ patch 952"
        [ "${ENABLE_SFE}" = "true" ] && ls ./target/linux/generic/hack-6.6/953-* && echo "✓ patch 953"
        [ "${ENABLE_SFE}" = "true" ] && ls ./target/linux/generic/pending-6.6/613-* && echo "✓ patch 613"

    # ================================================================
    # Step 5b: 处理 ImmortalWrt 自带 fullcone 冲突
    #
    # 经验教训:
    #   - ImmortalWrt 自带 fullconenat-nft 包和 firewall4 fullcone 补丁
    #   - add_turboacc.sh 已替换 firewall4/nftables/libnftnl
    #   - 必须移除自带的 fullconenat-nft 避免编译冲突
    # ================================================================
    - name: 处理 fullcone 包冲突
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        [ -d "./package/network/utils/fullconenat-nft" ] && {
          echo ">>> 移除 ImmortalWrt 自带的 fullconenat-nft"
          rm -rf ./package/network/utils/fullconenat-nft
        }
        [ -d "./package/network/utils/fullconenat" ] && {
          echo ">>> 移除 fullconenat (iptables 版本)"
          rm -rf ./package/network/utils/fullconenat
        }

    # ================================================================
    # Step 5c: 整合 OpenAppFilter
    #
    # 经验教训:
    #   - kmod-oaf 有 Kconfig 自引用循环依赖 bug
    #   - open-app-filter 目录嵌套在 OpenAppFilter/ 下，需要创建 symlink
    # ================================================================
    - name: 整合 OpenAppFilter
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        git clone --depth=1 \
          https://github.com/destan19/OpenAppFilter.git \
          package/OpenAppFilter

        # 修复: open-app-filter 在非标准父目录下，需要 symlink
        ln -sf OpenAppFilter/open-app-filter package/open-app-filter
        echo "✓ OpenAppFilter + symlink"

    # ================================================================
    # Step 5d: 整合 QuickStart
    #
    # 经验教训:
    #   - lq-wq/luci-app-quickstart 是第三方 fork，缺少前端静态资源
    #     导致 LuCI 页面一片空白
    #   - 官方源是 linkease/nas-packages (后端) + linkease/nas-packages-luci (前端)
    #   - luci-app-quickstart 的前端在 nas-packages-luci/luci/ 下
    #     包含 htdocs/luci-static/quickstart (CSS/JS/图片) 才能正常渲染
    #
    # 修复与定制:
    #   FIX-1: MT7981 CPU 温度路径是 /sys/class/thermal/thermal_zone0/temp
    #          单位为毫摄氏度，需除以 1000。quickstart 前端 JS 读取路径
    #          若不匹配会返回 0，通过 rpcd/ubus 的 system board 接口修正。
    #   FIX-2: nas-packages-luci 会在边栏注入 "NAS" 顶级菜单，
    #          在无 NAS 场景下需移除对应 menu entry。
    #   FIX-3: ttyd 终端默认挂在 "系统" 菜单下，移动到 "服务" 菜单。
    # ================================================================
    - name: 整合 QuickStart
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        # 后端服务 (quickstart daemon)
        git clone --depth=1 \
          https://github.com/linkease/nas-packages.git \
          /tmp/nas-packages
        cp -r /tmp/nas-packages/network/services/quickstart \
          package/quickstart

        # LuCI 前端 (官方 linkease 版本，含完整静态资源)
        git clone --depth=1 \
          https://github.com/linkease/nas-packages-luci.git \
          /tmp/nas-packages-luci
        cp -r /tmp/nas-packages-luci/luci/luci-app-quickstart \
          package/luci-app-quickstart

        # 移除对 luci-app-store 的强制依赖 (避免与 iStore feed 冲突)
        QS_MK="package/luci-app-quickstart/Makefile"
        if [ -f "$QS_MK" ]; then
          sed -i 's/+luci-app-store//g' "$QS_MK"
        fi

        # ---- FIX-1: 修复 CPU 温度显示为 0 --------------------------------
        # MT7981 温度节点: /sys/class/thermal/thermal_zone0/temp (单位: 毫摄氏度)
        # quickstart 前端通过 ubus call system board 获取温度，但该接口在
        # ImmortalWrt 上不含 temp 字段，需通过 rpcd 扩展脚本补充。
        # 在 uci-defaults 中写入 rpcd 扩展，让 system board 返回正确温度。
        mkdir -p package/base-files/files/usr/share/rpcd/acl.d
        mkdir -p package/base-files/files/etc/uci-defaults

        # rpcd shell 脚本: 扩展 ubus system board 返回 cpu_temp
        mkdir -p package/base-files/files/usr/libexec/rpcd
        cat > package/base-files/files/usr/libexec/rpcd/luci_thermal << 'RPCD_EOF'
        #!/bin/sh
        case "$1" in
          list)
            echo '{"get_temp":{}}'
            ;;
          call)
            case "$2" in
              get_temp)
                TEMP_RAW=$(cat /sys/class/thermal/thermal_zone0/temp 2>/dev/null || echo 0)
                TEMP_C=$(( TEMP_RAW / 1000 ))
                printf '{"temperature":%d}\n' "$TEMP_C"
                ;;
            esac
            ;;
        esac
        RPCD_EOF
        chmod +x package/base-files/files/usr/libexec/rpcd/luci_thermal

        # rpcd ACL: 允许 LuCI 访问该接口
        cat > package/base-files/files/usr/share/rpcd/acl.d/luci-thermal.json << 'ACL_EOF'
        {
          "luci-thermal": {
            "description": "LuCI thermal sensor access",
            "read": {
              "ubus": {
                "luci_thermal": [ "get_temp" ]
              }
            }
          }
        }
        ACL_EOF

        # quickstart 前端 JS 补丁: 优先读取 luci_thermal.get_temp，回退到原逻辑
        QS_CONTROLLER="package/luci-app-quickstart/htdocs/luci-static/quickstart"
        if [ -d "$QS_CONTROLLER" ]; then
          # 找到读取温度的 JS 文件并注入补丁
          TEMP_JS=$(grep -rl "cpu.*temp\|temperature\|thermal" "$QS_CONTROLLER" \
                    --include="*.js" 2>/dev/null | head -1 || true)
          if [ -n "$TEMP_JS" ]; then
            echo ">>> Patching temperature in: $TEMP_JS"
            # 将形如 res.temperature 或 data.temp 未除以1000的表达式修正
            # 如果值 > 1000 则认为是毫摄氏度，自动换算
            sed -i \
              's/\(temperature\s*[=:]\s*\)\([^;,}]*\)/\1(\2 > 1000 ? Math.round(\2 \/ 1000) : \2)/g' \
              "$TEMP_JS" 2>/dev/null || true
          fi
          echo "✓ Temperature patch applied"
        fi

        # uci-defaults: 重启 rpcd 以加载新的 luci_thermal 脚本
        cat > package/base-files/files/etc/uci-defaults/92-rpcd-thermal << 'EOF'
        #!/bin/sh
        /etc/init.d/rpcd restart 2>/dev/null || true
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/92-rpcd-thermal

        # ---- FIX-2: 删除 nas-packages-luci 注入的 NAS 边栏菜单 -----------
        # nas-packages-luci 会在多个 .lua/.json menudata 文件中注册
        # "nas" 或 "NAS" 顶级菜单入口，遍历删除
        NAS_LUCI_DIR="/tmp/nas-packages-luci/luci"
        for MENU_FILE in $(find package/luci-app-quickstart -name "*.lua" \
                           -o -name "*.json" 2>/dev/null); do
          # 删除 entry("nas", ...) 或 "nas": { ... } 形式的菜单注册
          sed -i '/entry.*["\x27]nas["\x27]/Id' "$MENU_FILE" 2>/dev/null || true
          sed -i '/"nas"\s*:/Id' "$MENU_FILE" 2>/dev/null || true
        done

        # 直接删除 nas-packages-luci 中可能复制进来的 NAS 菜单定义文件
        find package/luci-app-quickstart -name "*.lua" -exec \
          grep -l 'entry.*nas\b\|nas.*title\|NAS' {} \; 2>/dev/null | xargs -r \
          grep -L 'quickstart\|quick_start' | xargs -r rm -f
        echo "✓ NAS sidebar menu entries removed"

        # ---- FIX-3: 将 ttyd 终端从「系统」移动到「服务」菜单 ---------------
        # ttyd 的 LuCI 菜单由 feeds/luci/applications/luci-app-ttyd 控制
        # 菜单挂载点在 root.system 下，改为 root.services
        TTYD_LUCI=""
        for SEARCH_DIR in \
          feeds/luci/applications/luci-app-ttyd \
          package/feeds/luci/luci-app-ttyd; do
          [ -d "$SEARCH_DIR" ] && TTYD_LUCI="$SEARCH_DIR" && break
        done

        if [ -n "$TTYD_LUCI" ]; then
          echo ">>> ttyd LuCI found at: $TTYD_LUCI"
          # Lua controller 方式 (旧版)
          for F in $(find "$TTYD_LUCI" -name "*.lua" 2>/dev/null); do
            sed -i \
              's/entry({"admin","system","ttyd"}/entry({"admin","services","ttyd"}/g;
               s/entry({"admin", "system", "ttyd"}/entry({"admin", "services", "ttyd"}/g' \
              "$F" 2>/dev/null || true
          done
          # JSON menudata 方式 (新版 ucode/JS 前端)
          for F in $(find "$TTYD_LUCI" -name "*.json" 2>/dev/null); do
            sed -i \
              's/"admin\/system\/ttyd"/"admin\/services\/ttyd"/g' \
              "$F" 2>/dev/null || true
          done
          # ucode view 文件中的路由声明
          for F in $(find "$TTYD_LUCI" -name "*.uc" -o -name "*.js" 2>/dev/null); do
            sed -i \
              "s|'admin/system/ttyd'|'admin/services/ttyd'|g;
               s|\"admin/system/ttyd\"|\"admin/services/ttyd\"|g" \
              "$F" 2>/dev/null || true
          done
          echo "✓ ttyd menu moved: system → services"
        else
          # feeds 尚未安装，在 feeds 安装后通过 uci-defaults 修正
          # 写入一个 uci-defaults 脚本在首次启动时修正菜单
          echo ">>> ttyd LuCI not found yet, will patch via post-install hook"
        fi

        echo "✓ QuickStart (linkease official) + all patches applied"

    # ================================================================
    # Step 5e: 整合 Argon 主题 + 配置插件
    # ================================================================
    - name: 整合 Argon 主题
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        # Argon 主题 (master 分支适用于 Official OpenWrt / ImmortalWrt)
        git clone --depth=1 \
          https://github.com/jerrykuku/luci-theme-argon.git \
          package/luci-theme-argon

        # Argon 主题配置插件 (自定义登录背景/颜色等)
        git clone --depth=1 \
          https://github.com/jerrykuku/luci-app-argon-config.git \
          package/luci-app-argon-config

        echo "✓ Argon theme + config plugin"

    # ================================================================
    # Step 6: 更新 & 安装 feeds
    # ================================================================
    - name: 更新 feeds
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        # 追加 iStore feed (固定 main 分支)
        grep -q "istore" feeds.conf.default || \
          echo "src-git istore https://github.com/linkease/istore.git;main" >> feeds.conf.default

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ================================================================
    # Step 6b: Patch feeds 中的已知 Bug
    #
    # 经验教训:
    #   A. Rust download-ci-llvm=true 会 404 → 改为 false
    #   B. OpenClash 通过 Kconfig select 拉入 shadowsocks-rust → sed 删除
    #   C. libxcrypt ≤4.4.34 在 Perl 5.34+ 上 expand-selected-hashes 崩溃
    #      → 升级到 4.4.36 + 注入 PKG_FORTIFY_SOURCE:=0
    #   D. sbwml/packages_lang_golang 替换旧 Go 工具链 (解决 golang HOST 编译问题)
    # ================================================================
    - name: Patch feeds 已知 Bug
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        echo "=== Patch A: Rust download-ci-llvm ==="
        RUST_MK="feeds/packages/lang/rust/Makefile"
        if [ -f "$RUST_MK" ]; then
          sed -i 's/download-ci-llvm=true/download-ci-llvm=false/g' "$RUST_MK"
          grep "download-ci-llvm" "$RUST_MK" || true
          echo "✓ Rust patched"
        fi

        echo "=== Patch B: OpenClash shadowsocks-rust ==="
        OPENCLASH_MK="feeds/luci/applications/luci-app-openclash/Makefile"
        if [ -f "$OPENCLASH_MK" ]; then
          sed -i '/shadowsocks[-_]rust/Id' "$OPENCLASH_MK"
          echo "✓ shadowsocks-rust dependency removed"
        fi

        echo "=== Patch C: libxcrypt 4.4.36 + FORTIFY ==="
        LIBXCRYPT_MK="feeds/packages/libs/libxcrypt/Makefile"
        if [ -f "$LIBXCRYPT_MK" ]; then
          echo "  patch 前: $(grep '^PKG_VERSION' "$LIBXCRYPT_MK" || true)"
          sed -i 's/^PKG_VERSION:=.*/PKG_VERSION:=4.4.36/' "$LIBXCRYPT_MK"
          sed -i 's/^PKG_HASH:=.*/PKG_HASH:=e5e1f4caee0a01de2aee26e3138807d6d3ca2b8e67287966d1fefd65e1fd8943/' "$LIBXCRYPT_MK"
          # PKG_FORTIFY_SOURCE:=0 防止 -Werror=format-nonliteral
          if ! grep -q "^PKG_FORTIFY_SOURCE" "$LIBXCRYPT_MK"; then
            sed -i '/^include.*package\.mk/i PKG_FORTIFY_SOURCE:=0' "$LIBXCRYPT_MK"
          fi
          # 验证
          PATCHED_VER=$(grep "^PKG_VERSION" "$LIBXCRYPT_MK" \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$PATCHED_VER" != "4.4.36" ]; then
            echo "ERROR: libxcrypt 升级失败（当前: $PATCHED_VER）"
            exit 1
          fi
          echo "  patch 后: $PATCHED_VER ✓"
        fi

        echo "=== Patch D: sbwml golang ==="
        rm -rf feeds/packages/lang/golang
        git clone --depth=1 \
          https://github.com/sbwml/packages_lang_golang \
          feeds/packages/lang/golang
        echo "✓ golang replaced with sbwml version"

        echo "=== Patch E: ttyd 菜单从「系统」移到「服务」==="
        # feeds install 后，luci-app-ttyd 在 feeds/luci 和 package/feeds/luci 两个位置
        # 对所有可能的路径做全量替换，兼容 Lua/ucode/JSON 三种前端格式
        for TTYD_DIR in \
          feeds/luci/applications/luci-app-ttyd \
          package/feeds/luci/luci-app-ttyd; do
          if [ -d "$TTYD_DIR" ]; then
            echo "  patching $TTYD_DIR"
            # Lua controller (旧版: entry({"admin","system","ttyd"}))
            find "$TTYD_DIR" -name "*.lua" | xargs -r sed -i \
              's/entry({"admin","system","ttyd"}/entry({"admin","services","ttyd"}/g;
               s/entry({"admin", "system", "ttyd"}/entry({"admin", "services", "ttyd"}/g' \
              2>/dev/null || true
            # JSON menudata (新版: "admin/system/ttyd")
            find "$TTYD_DIR" -name "*.json" | xargs -r sed -i \
              's|"admin/system/ttyd"|"admin/services/ttyd"|g' \
              2>/dev/null || true
            # ucode / JS 视图文件
            find "$TTYD_DIR" \( -name "*.uc" -o -name "*.js" \) | xargs -r sed -i \
              "s|'admin/system/ttyd'|'admin/services/ttyd'|g;
               s|\"admin/system/ttyd\"|\"admin/services/ttyd\"|g" \
              2>/dev/null || true
            echo "  ✓ ttyd patched in $TTYD_DIR"
          fi
        done
        echo "✓ ttyd menu → services"

    # ================================================================
    # Step 7: 修改默认 LAN IP
    # ================================================================
    - name: 修改默认 LAN IP
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        sed -i 's/192.168.1.1/192.168.88.1/g' \
          package/base-files/files/bin/config_generate
        grep "192.168.88.1" package/base-files/files/bin/config_generate \
          && echo "✓ LAN IP → 192.168.88.1"

    # ================================================================
    # Step 7a: 设置 Argon 为默认主题
    # ================================================================
    - name: 设置 Argon 为默认主题
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        # 写入 uci-defaults 脚本，固件首次启动时自动执行
        mkdir -p package/base-files/files/etc/uci-defaults
        cat > package/base-files/files/etc/uci-defaults/90-default-theme << 'EOF'
        #!/bin/sh
        uci set luci.main.mediaurlbase='/luci-static/argon'
        uci commit luci
        exit 0
        EOF
        chmod +x package/base-files/files/etc/uci-defaults/90-default-theme
        echo "✓ Default theme → argon"

        # 修复 LuCI 上传 ipk 时 "XHR request aborted by browser" 错误
        # 原因: uhttpd 默认 POST 体积和 CGI 超时过小，大 ipk 上传/安装时被截断
        cat > package/base-files/files/etc/uci-defaults/91-uhttpd-upload-fix << 'UHEOF'
        #!/bin/sh
        uci set uhttpd.main.max_requests='32'
        uci set uhttpd.main.script_timeout='300'
        uci set uhttpd.main.network_timeout='120'
        uci set uhttpd.main.tcp_keepalive='1'
        uci commit uhttpd
        /etc/init.d/uhttpd restart
        exit 0
        UHEOF
        chmod +x package/base-files/files/etc/uci-defaults/91-uhttpd-upload-fix
        echo "✓ uhttpd upload fix"

    # ================================================================
    # Step 7b: 修复 kernel vermagic (匹配官方 immortalwrt)
    #
    # 经验教训:
    #   - 自编译固件的 kernel vermagic 与官方不同
    #   - 导致 opkg 无法安装官方 kmod ipk
    #   - 使用已确认的硬编码值最稳定
    # ================================================================
    - name: 修复 kernel vermagic
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        # 已从 downloads.immortalwrt.org 确认:
        # kmods/6.6.86-1-f2c63d42896f12da2b55f2c2b626e7be/
        VERMAGIC="f2c63d42896f12da2b55f2c2b626e7be"
        echo "$VERMAGIC" > vermagic
        echo "=== vermagic: $VERMAGIC ==="

        # Patch kernel-defaults.mk 使用固定 vermagic
        if grep -q 'MKHASH.*md5.*\.vermagic' include/kernel-defaults.mk; then
          sed -i \
            's|grep.*\.config\.set.*MKHASH.*md5.*\.vermagic|cp $(TOPDIR)/vermagic $(LINUX_DIR)/.vermagic|' \
            include/kernel-defaults.mk
          echo "✓ kernel-defaults.mk patched"
        else
          echo "⚠ kernel-defaults.mk 格式不匹配，跳过"
        fi

    # ================================================================
    # Step 8: 合并配置 & defconfig
    #
    # 经验教训:
    #   - kmod-nft-fullcone 有 Kconfig 自引用 bug，必须显式 =y
    #   - kmod-oaf 同上
    #   - dnsmasq 与 dnsmasq-full 冲突，必须禁用基础版
    # ================================================================
    - name: 合并配置 & defconfig
      working-directory: ${{ env.WORKSPACE }}/openwrt
      env:
        ENABLE_SFE: ${{ github.event.inputs.enable_sfe || 'true' }}
      run: |
        # 合并两层配置
        cat $GITHUB_WORKSPACE/configs/mt7981-common.config > .config
        cat $GITHUB_WORKSPACE/configs/seed-ac2.config >> .config

        # SFE 配置追加
        if [ "${ENABLE_SFE}" = "true" ]; then
          cat >> .config << 'EOF'
        CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_SHORTCUT_FE_CM=y
        CONFIG_PACKAGE_kmod-shortcut-fe=y
        CONFIG_PACKAGE_kmod-shortcut-fe-cm=y
        CONFIG_PACKAGE_kmod-fast-classifier=y
        EOF
        fi

        make defconfig

        echo "=== 诊断: turboacc 相关 ==="
        grep -iE "turboacc|fullcone|offload|bbr|shortcut|sfe" .config || echo "(none)"
        echo "=== 诊断: dnsmasq ==="
        grep -i "dnsmasq" .config | head -4 || echo "(none)"

    # ================================================================
    # Step 9: (可选) SSH 调试
    # ================================================================
    - name: SSH 调试
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.enable_ssh == 'true'

    # ================================================================
    # Step 10: 下载源码包
    # ================================================================
    - name: 下载源码包
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        make download -j16
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # ================================================================
    # Step 11: 编译固件
    # ================================================================
    - name: 编译固件
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        echo "============================================"
        echo "  开始编译 | CPU: $(nproc) cores"
        echo "  $(date +'%Y-%m-%d %H:%M:%S')"
        echo "============================================"
        make -j$(nproc) || make -j1 V=s 2>&1 | tee build.log | tail -100

    # ================================================================
    # Step 12: 整理固件
    # ================================================================
    - name: 整理固件文件
      if: success()
      working-directory: ${{ env.WORKSPACE }}/openwrt
      run: |
        mkdir -p $GITHUB_WORKSPACE/firmware
        cp -f bin/targets/mediatek/filogic/*seed-ac2* \
              $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
        cp -f bin/targets/mediatek/filogic/sha256sums \
              $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
        cp -f bin/targets/mediatek/filogic/config.buildinfo \
              $GITHUB_WORKSPACE/firmware/ 2>/dev/null || true
        echo "=== 编译产物 ==="
        ls -lh $GITHUB_WORKSPACE/firmware/

    # ================================================================
    # Step 13: 上传 Artifacts
    # ================================================================
    - name: 上传固件到 Artifacts
      uses: actions/upload-artifact@v4.6.2
      if: success()
      with:
        name: ImmortalWrt-TurboACC-SEED-AC2-${{ github.run_number }}
        path: firmware/
        retention-days: 30

    # ================================================================
    # Step 14: 创建 Release
    # ================================================================
    - name: 生成 Release Tag
      id: tag
      if: success()
      run: |
        echo "release_tag=SEED-AC2-$(date +"%Y%m%d-%H%M")" >> $GITHUB_OUTPUT
        echo "release_date=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_OUTPUT

    - name: 创建 Release
      uses: softprops/action-gh-release@v2.3.2
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        name: "SEED AC2 (${{ steps.tag.outputs.release_date }})"
        body: |
          ## ImmortalWrt + TurboACC 固件 (BeeconMini SEED AC2)

          - **源码**: BeeconMini/immortalwrt (Commit: ${{ env.REPO_COMMIT }})
          - **版本**: ImmortalWrt 24.10.1 | 内核 6.6
          - **设备**: BeeconMini SEED AC2 (MT7981B, 无 Wi-Fi, 9口 2.5G PoE)
          - **TurboACC**: Flow Offload + Fullcone NAT + BBR
          - **SFE**: ${{ github.event.inputs.enable_sfe || 'true' }}
          - **默认 IP**: 192.168.88.1 | 用户名: root | 密码: 无
        files: firmware/*
