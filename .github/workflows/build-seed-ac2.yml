name: Build BeeconMini SEED AC2

# 仅手动触发
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ──────────────────────────────────────────────────────────────
      # 0. 把构建目录挂到 runner 的 150 GB 临时盘（/mnt）
      #    避免系统盘（约 14 GB）编译中途爆满
      # ──────────────────────────────────────────────────────────────
      - name: Mount build workspace to /mnt
        run: |
          sudo mkdir -p /mnt/openwrt
          sudo chown runner:runner /mnt/openwrt
          echo "WORKSPACE=/mnt/openwrt" >> $GITHUB_ENV

      # ──────────────────────────────────────────────────────────────
      # 1. 检出本仓库（包含 configs/ 目录）
      # ──────────────────────────────────────────────────────────────
      - name: Checkout this repo
        uses: actions/checkout@v4.2.2
        with:
          path: source

      # ──────────────────────────────────────────────────────────────
      # 2. 释放 runner 自带的无用磁盘空间（~5 GB）
      # ──────────────────────────────────────────────────────────────
      - name: Free runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache \
            /usr/local/lib/android \
            || true

      # ──────────────────────────────────────────────────────────────
      # 3. 安装编译依赖
      # ──────────────────────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential ccache clang cmake cpio curl file flex gawk \
            gettext git gperf libncurses5-dev libssl-dev python3 rsync \
            unzip wget zlib1g-dev zstd lib32gcc-s1 libc6-dev-i386 \
            subversion patch

      # ──────────────────────────────────────────────────────────────
      # 4. 克隆 BeeconMini ImmortalWrt（branch 24.10.1）
      # ──────────────────────────────────────────────────────────────
      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b 24.10.1 \
            https://github.com/BeeconMini/immortalwrt.git \
            $WORKSPACE/openwrt

      # ──────────────────────────────────────────────────────────────
      # 5. 更新 feeds
      #    标准 feeds（packages / luci / routing / telephony）来自
      #    仓库内的 feeds.conf.default，固定 commit 保证可复现。
      #    额外追加 iStore feed 以获取 luci-app-store / luci-app-quickstart
      # ──────────────────────────────────────────────────────────────
      - name: Update & install feeds
        run: |
          cd $WORKSPACE/openwrt
          # 追加 iStore feed（提供应用商店 & 快速配置向导）
          echo "src-git istore https://github.com/linkease/istore.git;main" \
            >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ──────────────────────────────────────────────────────────────
      # 6. 修补 Rust 工具链：禁用 download-ci-llvm
      #
      #    【问题根因 - 已通过社区研究确认】
      #    feeds/packages/lang/rust/Makefile 中有：
      #      --set=llvm.download-ci-llvm=true
      #    这使得编译时尝试从 ci-artifacts.rust-lang.org 下载
      #    Rust 1.85.0 对应 commit 的预编译 LLVM，但该 URL 已 404
      #    （Rust CI 只保留最近期构建产物，旧版本会定期清理）。
      #
      #    【官方认可的解决方案】
      #    来源：OpenWrt 官方 commit b49fb106、OpenWrt Forum、
      #    openwrt/packages issue #27331
      #    方法：将 Makefile 中 download-ci-llvm=true 改为 false，
      #    让 LLVM 从源码本地编译（会多花 ~20 分钟，但可靠）。
      #
      #    【附加修补：openclash 的 shadowsocks-rust 依赖】
      #    luci-app-openclash 通过 Kconfig "select" 强制拉入
      #    shadowsocks-rust，而 Kconfig select 无法被用户 config
      #    行（=n / is not set）覆盖。删除该依赖行后 OpenClash
      #    功能不受影响（Clash 内核是 Go 编写，不依赖 Rust）。
      # ──────────────────────────────────────────────────────────────
      - name: Patch feeds - fix Rust LLVM and OpenClash dependency
        run: |
          # ── 补丁 A：rust Makefile 禁用 download-ci-llvm ──────────
          RUST_MK="$WORKSPACE/openwrt/feeds/packages/lang/rust/Makefile"
          if [ -f "$RUST_MK" ]; then
            echo "=== rust Makefile patch 前 ==="
            grep "download-ci-llvm" "$RUST_MK" || echo "（未找到该行）"
            # 将 download-ci-llvm=true 替换为 false
            sed -i 's/download-ci-llvm=true/download-ci-llvm=false/g' "$RUST_MK"
            echo "=== rust Makefile patch 后 ==="
            grep "download-ci-llvm" "$RUST_MK"
          else
            echo "WARNING: rust Makefile 未找到：$RUST_MK"
          fi

          # ── 补丁 B：openclash Makefile 移除 shadowsocks-rust 依赖 ─
          OPENCLASH_MK="$WORKSPACE/openwrt/feeds/luci/applications/luci-app-openclash/Makefile"
          if [ -f "$OPENCLASH_MK" ]; then
            echo "=== openclash shadowsocks-rust 行（patch 前）==="
            grep -n "shadowsocks.rust" "$OPENCLASH_MK" || echo "（未找到，可能已不存在）"
            sed -i '/shadowsocks.rust/Id' "$OPENCLASH_MK"
            echo "=== patch 后残余 shadowsocks 行 ==="
            grep -n "shadowsocks" "$OPENCLASH_MK" || echo "（干净）"
          else
            echo "WARNING: openclash Makefile 未找到：$OPENCLASH_MK"
          fi

      # ──────────────────────────────────────────────────────────────
      # 7. 集成 OpenAppFilter（OAF 应用过滤）
      #    官方推荐方式：clone 到 package/ 目录，无需 feeds
      #    启用 CONFIG_PACKAGE_luci-app-oaf=y，make defconfig 自动拉入：
      #      kmod-oaf（内核模块）/ oaf（服务守护进程）/ luci-app-oaf（LuCI 页面）
      # ──────────────────────────────────────────────────────────────
      - name: Integrate OpenAppFilter (OAF)
        run: |
          git clone --depth=1 \
            https://github.com/destan19/OpenAppFilter.git \
            $WORKSPACE/openwrt/package/OpenAppFilter

      # ──────────────────────────────────────────────────────────────
      # 8. 合并配置 & make defconfig
      #
      #    两层 cat 合并：
      #      ① mt7981-common.config — MT7981B 平台通用（无 Wi-Fi）
      #      ② seed-ac2.config      — SEED AC2 专属差异
      #         · subtarget=filogic（非 mt7981，已从源码确认）
      #         · kmod-switch-rtl8373 + kmod-i2c-gpio（RTL8373 交换芯片）
      #         · PoE / OAF / OpenClash / NLBW / VLMCSD 等应用包
      #
      #    make defconfig 补全其余默认值，并自动拉入 DEVICE_PACKAGES 中
      #    声明的 kmod-switch-rtl8373 / kmod-fs-f2fs / kmod-fs-ext4 等
      # ──────────────────────────────────────────────────────────────
      - name: Merge config & run defconfig
        run: |
          cd $WORKSPACE/openwrt
          cat \
            $GITHUB_WORKSPACE/source/configs/mt7981-common.config \
            $GITHUB_WORKSPACE/source/configs/seed-ac2.config \
            > .config
          make defconfig
          # 诊断：确认 rust 编译选项状态
          echo "=== .config 中 rust / shadowsocks-rust 相关行 ==="
          grep -i "CONFIG.*rust" .config || echo "（rust 相关包未被选中）"

      # ──────────────────────────────────────────────────────────────
      # 9. 下载所有源码包（并行 + 失败重试）
      # ──────────────────────────────────────────────────────────────
      - name: Download package sources
        run: |
          cd $WORKSPACE/openwrt
          make download -j$(nproc)
          # 补救：重试一次避免偶发网络超时导致失败
          make download -j$(nproc) || true

      # ──────────────────────────────────────────────────────────────
      # 10. 编译固件
      #     先并行编译；失败后以单线程 + 详细日志重试便于排查
      # ──────────────────────────────────────────────────────────────
      - name: Compile firmware
        run: |
          cd $WORKSPACE/openwrt
          make -j$(nproc) || make -j1 V=s

      # ──────────────────────────────────────────────────────────────
      # 11. 收集固件产物
      # ──────────────────────────────────────────────────────────────
      - name: Collect firmware artifacts
        run: |
          mkdir -p /tmp/artifacts
          find $WORKSPACE/openwrt/bin/targets -type f \
            \( -name "*sysupgrade*.bin" \
               -o -name "*factory*.bin" \
               -o -name "*.manifest" \) \
            -exec cp {} /tmp/artifacts/ \;
          echo "=== Collected files ==="
          ls -lh /tmp/artifacts/

      # ──────────────────────────────────────────────────────────────
      # 12. 上传 GitHub Artifact（便于直接下载，30 天保留）
      # ──────────────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: beeconmini-seed-ac2-${{ github.run_number }}
          path: /tmp/artifacts/
          retention-days: 30

      # ──────────────────────────────────────────────────────────────
      # 13. 生成 Release Tag（格式：yyyymmdd + run_number）
      # ──────────────────────────────────────────────────────────────
      - name: Generate release tag
        id: tag
        run: |
          echo "TAG=$(date +%Y%m%d)${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ──────────────────────────────────────────────────────────────
      # 14. 发布 GitHub Release
      # ──────────────────────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        if: success()
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "BeeconMini SEED AC2 | ${{ steps.tag.outputs.TAG }}"
          body: |
            ## BeeconMini SEED AC2 自动构建固件

            **构建信息**
            - Commit: ${{ github.sha }}
            - Branch: 24.10.1
            - 上游: BeeconMini/immortalwrt

            **硬件规格**
            | 项目 | 参数 |
            |------|------|
            | CPU | MT7981B (Filogic 820) |
            | 交换芯片 | RTL8373（8×2.5G PoE+） |
            | WAN PHY | RTL8221B（2.5G） |
            | 存储 | 1G RAM + 64G eMMC |
            | Wi-Fi | 无 |
            | PoE 单口最大功率 | 30W |

            **固件包含功能**
            - PoE 管理（RTL8238B，8 口 PoE+）
            - OpenClash（透明代理）
            - OAF 应用过滤（OpenAppFilter，支持抖音/王者荣耀等数百款 App）
            - NLBW（实时带宽监控）
            - VLMCSD（KMS 激活服务器）
            - ttyd（Web 终端）
            - iStore 应用商店 + QuickStart 快速配置
            - 定时重启
            - TurboACC MTK HW NAT 硬件加速
            - eQoS 带宽控制 / UPnP

            **刷机说明**
            - `*sysupgrade*` — 从 OpenWrt/ImmortalWrt 在线升级
            - `*factory*` — 从原厂固件首次刷入
          files: |
            ${{ env.WORKSPACE }}/openwrt/bin/targets/*/*/*.bin
            ${{ env.WORKSPACE }}/openwrt/bin/targets/*/*/*.manifest
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
